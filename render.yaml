services:
  - type: web
    name: queuecare
    runtime: docker
    envVars:
      - key: QUEUECARE_DB_URL
        fromDatabase:
          name: queuecare-db
          property: connectionString
      - key: QUEUECARE_DB_USERNAME
        fromDatabase:
          name: queuecare-db
          property: user
      - key: QUEUECARE_DB_PASSWORD
        fromDatabase:
          name: queuecare-db
          property: password

databases:
  - name: queuecare-db
    databaseName: queuecare
    plan: free
