spring.application.name=queuecare
spring.web.resources.add-mappings=true

spring.datasource.url=${QUEUECARE_DB_URL:jdbc:postgresql://localhost:5432/queuecare}
spring.datasource.username=${QUEUECARE_DB_USERNAME:postgres}
spring.datasource.password=${QUEUECARE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080
