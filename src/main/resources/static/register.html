<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QueueCare - Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .wrapper { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { color: #fff; font-size: 2rem; font-weight: 700; letter-spacing: 1px; }
    .logo p { color: #bee3f8; font-size: 0.9rem; margin-top: 0.25rem; }
    .card { background: #fff; border-radius: 12px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .card h2 { font-size: 1.4rem; color: #1a202c; margin-bottom: 1.75rem; font-weight: 600; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 0.95rem; color: #2d3748; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    .btn-submit {
      width: 100%; padding: 0.8rem; background: #38a169; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn-submit:hover { background: #276749; }
    .btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }
    .alert { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .alert-error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .alert-success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #718096; }
    .footer-link a { color: #2b6cb0; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .info-note { background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.82rem; color: #2c5282; margin-bottom: 1.25rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">
      <h1>QueueCare</h1>
      <p>Clinic Appointment Management System</p>
    </div>
    <div class="card">
      <h2>Create Patient Account</h2>
      <div id="error-msg" class="alert alert-error" data-testid="error-message"></div>
      <div id="success-msg" class="alert alert-success" data-testid="success-message"></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" data-testid="name-input" placeholder="Your full name" autocomplete="name" required/>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" type="email" data-testid="email-input" placeholder="you@example.com" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" data-testid="password-input" placeholder="Minimum 6 characters" autocomplete="new-password" required/>
        </div>
        <button type="submit" class="btn-submit" data-testid="register-button">Create Account</button>
      </form>
      <div class="footer-link">
        Already have an account? <a href="/login.html" data-testid="login-link">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const btn = document.querySelector('.btn-submit');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        errorEl.textContent = 'All fields are required.';
        errorEl.style.display = 'block';
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role: 'PATIENT' })
        });

        if (res.status === 409) {
          errorEl.textContent = 'An account with this email already exists.';
          errorEl.style.display = 'block';
          return;
        }
        if (res.status === 400) {
          const data = await res.json();
          errorEl.textContent = data.error || 'Invalid input.';
          errorEl.style.display = 'block';
          return;
        }
        if (!res.ok) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          errorEl.style.display = 'block';
          return;
        }

        successEl.textContent = 'Account created! Redirecting to login...';
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 1500);
      } catch {
        errorEl.textContent = 'Could not connect to server.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
